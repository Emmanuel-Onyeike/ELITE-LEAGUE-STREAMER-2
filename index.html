<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE LEAGUE | Live Finals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #0a192f, #020617);
            min-height: 100vh;
        }

        @keyframes pulse-glow { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.1); } }
        .status-pulse { animation: pulse-glow 2s infinite; }
        
        .blue-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #toast {
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.4);
        }

        .video-inset {
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
        }

        /* Centered Modal per User Instructions */
        .modal-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 1.5rem;
        }
    </style>
</head>
<body class="text-slate-100 antialiased overflow-x-hidden">

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-8 py-4 rounded-2xl transform -translate-y-24 opacity-0 z-[200] flex items-center gap-4 max-w-lg border border-blue-400/50">
        <div class="bg-white/20 p-2 rounded-full">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <span id="toastMessage" class="font-bold tracking-tight"></span>
    </div>

    <header class="p-6 flex justify-between items-center border-b border-white/5 bg-black/20 backdrop-blur-xl sticky top-0 z-40">
        <div class="flex items-center space-x-4">
            <div id="statusIndicator" class="w-3.5 h-3.5 bg-slate-600 rounded-full transition-all duration-500"></div>
            <h1 class="text-2xl font-extrabold tracking-tighter uppercase italic flex items-center gap-2">
                <span class="bg-blue-600 px-2 py-0.5 rounded text-white not-italic">ELITE</span>
                <span class="text-blue-400">LEAGUE</span>
            </h1>
        </div>
        <button id="loginBtn" class="text-[10px] tracking-[0.2em] font-black bg-blue-600/10 border border-blue-500/30 px-6 py-3 rounded-full hover:bg-blue-600 hover:text-white transition-all">
            ADMIN ACCESS
        </button>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-10 space-y-12">
        
        <section id="adminPanel" class="hidden animate-in fade-in slide-in-from-top-4 duration-700">
            <div class="p-1 rounded-[3rem] bg-gradient-to-br from-blue-500/20 to-transparent border border-blue-500/30">
                <div class="blue-glass p-8 md:p-10 rounded-[2.8rem]">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
                        <div>
                            <span class="bg-blue-500/20 text-blue-400 text-[10px] font-black px-3 py-1 rounded-full tracking-widest uppercase mb-3 inline-block">Control Center</span>
                            <h2 class="text-3xl font-extrabold tracking-tight">Broadcaster Hub</h2>
                        </div>
                        <button id="logoutBtn" class="px-6 py-3 bg-red-500/10 text-red-400 rounded-2xl text-xs font-black border border-red-500/20 hover:bg-red-500 hover:text-white transition">
                            END SESSION
                        </button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-5 gap-10">
                        <div class="lg:col-span-3 relative aspect-video bg-black rounded-[2.5rem] overflow-hidden border border-white/5 shadow-2xl video-inset">
                            <div id="local-player" class="w-full h-full object-cover"></div>
                            <div class="absolute top-6 left-6 flex items-center gap-3 bg-black/60 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10">
                                <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                                <span class="text-[10px] font-bold tracking-widest text-blue-100">CAM PREVIEW</span>
                            </div>
                        </div>

                        <div class="lg:col-span-2 flex flex-col justify-center gap-4">
                            <button id="streamToggleBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-8 rounded-[2rem] shadow-[0_20px_40px_-10px_rgba(37,99,235,0.4)] uppercase tracking-tighter text-2xl active:scale-95 transition-all">
                                Go Live to School
                            </button>

                            <button id="switchCameraBtn" class="hidden bg-slate-800/50 hover:bg-slate-700 text-white font-bold py-5 px-6 rounded-2xl border border-white/5 transition flex items-center justify-center gap-3">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                Switch View
                            </button>

                            <button id="pushAlertBtn" class="bg-white/5 hover:bg-white/10 py-5 rounded-2xl font-bold border border-white/10 transition-colors text-sm tracking-tight">
                                📢 Notify: "GAME BEGUN!"
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="relative group">
            <div class="blue-glass rounded-[4rem] overflow-hidden border border-blue-500/10">
                <div id="player-stage" class="aspect-video bg-black flex flex-col items-center justify-center text-center p-6 relative">
                    <div id="standby-ui" class="z-10 animate-pulse">
                        <div class="mb-8 relative">
                            <div class="absolute inset-0 bg-blue-500/20 blur-3xl rounded-full"></div>
                            <svg class="w-24 h-24 mx-auto text-blue-500/40 relative" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                        <h2 class="text-4xl md:text-5xl font-black italic tracking-tighter mb-4 text-slate-400">CONNECTING...</h2>
                        <p class="text-slate-500 font-medium max-w-sm mx-auto text-sm md:text-base">Elite League main feed. Broadcast will resume shortly.</p>
                    </div>

                    <div id="remote-player" class="absolute inset-0 w-full h-full bg-black"></div>
                    
                    <div id="live-tag" class="absolute top-10 left-10 hidden flex items-center gap-3 bg-red-600 text-white px-5 py-2.5 rounded-full z-20 shadow-2xl border border-white/20">
                        <div class="w-2.5 h-2.5 bg-white rounded-full animate-ping"></div>
                        <span class="text-xs font-black uppercase tracking-[0.2em]">LIVE</span>
                    </div>
                </div>

                <div class="px-10 py-6 bg-blue-950/20 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
                    <span class="text-slate-500 text-xs font-bold tracking-widest uppercase">Elite League Official Broadcast</span>
                    <div class="flex gap-4">
                        <div class="w-2 h-2 rounded-full bg-blue-500/40"></div>
                        <div class="w-2 h-2 rounded-full bg-blue-500/20"></div>
                        <div class="w-2 h-2 rounded-full bg-blue-500/10"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="pinModal" class="modal-overlay hidden">
        <div class="bg-slate-900 p-12 rounded-[3.5rem] border border-blue-500/20 w-full max-w-md text-center shadow-[0_0_100px_rgba(37,99,235,0.15)]">
            <div class="w-24 h-24 bg-blue-600/10 text-blue-500 rounded-3xl flex items-center justify-center mx-auto mb-8 border border-blue-500/20 rotate-3">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h3 class="text-3xl font-black mb-2 tracking-tighter">Admin Login</h3>
            <p class="text-slate-500 text-sm mb-8">Enter your secure 4-digit PIN</p>
            <p id="slotMessage" class="text-red-400 text-xs mb-6 hidden font-bold uppercase tracking-wide">All 4 slots are occupied</p>
            <input type="password" id="pinInput" maxlength="4" placeholder="••••" class="w-full bg-black border border-white/10 p-6 rounded-3xl text-center text-5xl tracking-[0.4em] mb-8 outline-none focus:border-blue-500 text-blue-500 transition-all placeholder:text-slate-800">
            <button id="submitPin" class="w-full bg-blue-600 text-white font-black py-6 rounded-[2rem] shadow-xl active:scale-95 transition-transform text-lg uppercase tracking-widest">
                Unlock Panel
            </button>
            <button id="closePin" class="mt-8 text-slate-600 text-xs font-black uppercase tracking-widest hover:text-white transition-colors">Cancel</button>
        </div>
    </div>

    <div id="alertModal" class="modal-overlay hidden">
        <div class="bg-white text-blue-950 p-12 rounded-[4rem] w-full max-w-md text-center shadow-2xl">
            <div class="w-24 h-24 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-8 border border-blue-100">
                <svg class="w-12 h-12 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            </div>
            <h3 id="alertTitle" class="text-4xl font-black mb-4 uppercase tracking-tighter italic"></h3>
            <p id="alertMsg" class="text-slate-600 mb-10 font-bold leading-relaxed text-lg"></p>
            <button id="closeAlert" class="w-full bg-blue-600 text-white font-black py-6 rounded-3xl shadow-xl hover:bg-blue-700 transition-colors uppercase tracking-[0.2em] text-sm">
                Return to Viewer
            </button>
        </div>
    </div>

    <script type="module">
        /* ALL LOGIC UNCHANGED */
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction, set } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsxf_2FkvyfU2QQsd_DBytd9pPi6r4o0k",
            authDomain: "learning-pro-f756e.firebaseapp.com",
            projectId: "learning-pro-f756e",
            storageBucket: "learning-pro-f756e.firebasestorage.app",
            messagingSenderId: "410163553623",
            appId: "1:410163553623:web:10fceb9616086fe9640a12",
            measurementId: "G-RXKDXG4J84"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const AGORA_APP_ID = "6b0b36a41dae4815b0d440836a4fb1f6";
        const CHANNEL = "EliteLeagueFinals-Backup1";
        const ADMIN_PIN = "2026";
        const MAX_ADMINS = 4;

        const viewerClient = AgoraRTC.createClient({ mode: "live", codec: "h264" });
        let hostClient = null;
        let localTracks = { audioTrack: null, videoTrack: null };
        let isStreaming = false;
        let currentFacingMode = "user";

        const openModal = id => document.getElementById(id)?.classList.remove('hidden');
        const closeModal = id => document.getElementById(id)?.classList.add('hidden');

        const showToast = (msg, duration = 5000) => {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = msg;
            toast.classList.remove('-translate-y-24', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => toast.classList.add('-translate-y-24', 'opacity-0'), duration);
        };

        const verifyAdmin = () => {
            const pin = document.getElementById('pinInput')?.value;
            const slotMsg = document.getElementById('slotMessage');

            if (pin !== ADMIN_PIN) {
                alert("Wrong PIN – try 2026");
                document.getElementById('pinInput').value = "";
                return;
            }

            runTransaction(ref(db, 'adminsLive'), (count) => {
                count = count || 0;
                if (count >= MAX_ADMINS) {
                    slotMsg?.classList.remove('hidden');
                    return count;
                }
                return count + 1;
            }).then(r => {
                if (r.committed) {
                    closeModal('pinModal');
                    document.getElementById('adminPanel')?.classList.remove('hidden');
                    document.getElementById('loginBtn').innerText = "DASHBOARD";
                    document.getElementById('loginBtn').classList.add('bg-blue-600', 'text-white');
                    slotMsg?.classList.add('hidden');
                    showToast("Admin slot reserved — camera ready!");
                }
            });
        };

        const toggleStream = async () => {
            const btn = document.getElementById('streamToggleBtn');
            const switchBtn = document.getElementById('switchCameraBtn');
            if (!isStreaming) {
                try {
                    hostClient = AgoraRTC.createClient({ mode: "live", codec: "h264" });
                    hostClient.setClientRole("host");
                    await hostClient.join(AGORA_APP_ID, CHANNEL, null, null);
                    localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                    localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({
                        encoderConfig: "480p_1",
                        facingMode: currentFacingMode
                    });
                    localTracks.videoTrack.play("local-player");
                    await hostClient.publish([localTracks.audioTrack, localTracks.videoTrack]);
                    isStreaming = true;
                    btn.innerText = "STOP FEED";
                    btn.classList.add('bg-red-600');
                    switchBtn?.classList.remove('hidden');
                    document.getElementById('statusIndicator').classList.add('bg-blue-500', 'status-pulse');
                } catch (e) { alert("Failed: " + e.message); }
            } else { location.reload(); }
        };

        const switchCamera = async () => {
            if (!isStreaming || !localTracks.videoTrack) return;
            currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
            const newTrack = await AgoraRTC.createCameraVideoTrack({
                encoderConfig: "480p_1",
                facingMode: currentFacingMode
            });
            await hostClient.unpublish(localTracks.videoTrack);
            localTracks.videoTrack.close();
            localTracks.videoTrack = newTrack;
            localTracks.videoTrack.play("local-player");
            await hostClient.publish(localTracks.videoTrack);
            showToast(`Switched to ${currentFacingMode === "user" ? "front" : "back"} camera`);
        };

        const sendPushAlert = () => {
            set(ref(db, 'globalAlert/latest'), {
                title: "GAME BEGUN! 🏆",
                message: "The Elite League Finals are live now! Join the stream.",
                timestamp: Date.now()
            });
            showToast("Notification sent to all viewers!");
        };

        onValue(ref(db, 'globalAlert/latest'), snap => {
            const data = snap.val();
            if (data && Date.now() - data.timestamp < 300000) {
                document.getElementById('alertTitle').innerText = data.title;
                document.getElementById('alertMsg').innerText = data.message;
                openModal('alertModal');
            }
        });

        async function initViewer() {
            try {
                viewerClient.setClientRole("audience");
                await viewerClient.join(AGORA_APP_ID, CHANNEL, null, null);
                viewerClient.on("user-published", async (user, mediaType) => {
                    await viewerClient.subscribe(user, mediaType);
                    if (mediaType === "video") {
                        document.getElementById('standby-ui')?.classList.add('hidden');
                        document.getElementById('statusIndicator')?.classList.add('bg-blue-500', 'status-pulse');
                        document.getElementById('live-tag')?.classList.remove('hidden');
                        user.videoTrack.play("remote-player");
                    }
                    if (mediaType === "audio") user.audioTrack.play();
                });
            } catch (e) {}
        }

        document.addEventListener("DOMContentLoaded", () => {
            initViewer();
            document.getElementById('loginBtn')?.addEventListener('click', () => openModal('pinModal'));
            document.getElementById('submitPin')?.addEventListener('click', verifyAdmin);
            document.getElementById('closePin')?.addEventListener('click', () => closeModal('pinModal'));
            document.getElementById('pushAlertBtn')?.addEventListener('click', sendPushAlert);
            document.getElementById('streamToggleBtn')?.addEventListener('click', toggleStream);
            document.getElementById('switchCameraBtn')?.addEventListener('click', switchCamera);
            document.getElementById('closeAlert')?.addEventListener('click', () => closeModal('alertModal'));
            document.getElementById('logoutBtn')?.addEventListener('click', () => location.reload());
        });
    </script>
</body>
</html>
